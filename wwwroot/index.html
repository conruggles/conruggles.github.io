<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connor Ruggles</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link href="_content/Blazor.Bootstrap/blazor.bootstrap.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="conruggles.github.io.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <script src="_content/Blazor.Bootstrap/blazor.bootstrap.js"></script>
    <script>
        window.siteSidebar = {
            hideIfMobile: function (elementId, maxWidth) {
                if (window.innerWidth > maxWidth || typeof bootstrap === "undefined") {
                    return;
                }

                var element = document.getElementById(elementId);
                if (!element) {
                    return;
                }

                var collapse = bootstrap.Collapse.getOrCreateInstance(element, { toggle: false });
                collapse.hide();
            },
            enableOutsideClose: function (elementId, maxWidth) {
                if (typeof bootstrap === "undefined") {
                    return;
                }

                var element = document.getElementById(elementId);
                if (!element || element.dataset.outsideCloseBound === "1") {
                    return;
                }

                element.dataset.outsideCloseBound = "1";

                document.addEventListener("click", function (event) {
                    if (window.innerWidth > maxWidth) {
                        return;
                    }

                    if (!element.classList.contains("show")) {
                        return;
                    }

                    var target = event.target;
                    if (!(target instanceof Element)) {
                        return;
                    }

                    if (element.contains(target)) {
                        return;
                    }

                    var toggleButton = target.closest('[data-bs-target="#' + elementId + '"]');
                    if (toggleButton) {
                        return;
                    }

                    var collapse = bootstrap.Collapse.getOrCreateInstance(element, { toggle: false });
                    collapse.hide();
                });
            }
        };
    </script>
</body>

</html>
